  <!-- CONFIG -->

    const DESIGN_WIDTH = 1024;
    const DESIGN_HEIGHT = 600;

      UI_BOTTOM_MARGIN: 20,
      UI_LEFT_MARGIN: 170,
      UI_RIGHT_MARGIN: 120,
      LANES: 5,
      COLUMNS: 9,
      get CELL_WIDTH() { return (DESIGN_WIDTH - this.UI_LEFT_MARGIN - this.UI_RIGHT_MARGIN) / this.COLUMNS; },
      get CELL_HEIGHT() { return (DESIGN_HEIGHT - this.UI_TOP_MARGIN - this.UI_BOTTOM_MARGIN) / this.LANES; }
    };

    const GRID_CONFIG = {

      CELL_WIDTH: LAYOUT.CELL_WIDTH,
      CELL_HEIGHT: LAYOUT.CELL_HEIGHT,

  <!-- UTILS -->
  <script>
    function gridToPixel(gridX, gridY) {
      return {
        x: LAYOUT.UI_LEFT_MARGIN + gridX * LAYOUT.CELL_WIDTH + LAYOUT.CELL_WIDTH / 2,
        y: LAYOUT.UI_TOP_MARGIN + gridY * LAYOUT.CELL_HEIGHT + LAYOUT.CELL_HEIGHT / 2
      };
    }

    function pixelToGrid(pixelX, pixelY) {
      const gridX = Math.floor((pixelX - LAYOUT.UI_LEFT_MARGIN) / LAYOUT.CELL_WIDTH);
      const gridY = Math.floor((pixelY - LAYOUT.UI_TOP_MARGIN) / LAYOUT.CELL_HEIGHT);
      
      if (gridX < 0 || gridX >= LAYOUT.COLUMNS || 
          gridY < 0 || gridY >= LAYOUT.LANES) {
        return null;
      }
      
      return { x: gridX, y: gridY };
    }

    function canPlacePlant(gridX, gridY, grid) {
      if (gridX < 0 || gridX >= LAYOUT.COLUMNS ||
          gridY < 0 || gridY >= LAYOUT.LANES) {
        return false;
      }
      return grid[gridY][gridX] === null;
    }

    // Responsive scaling
    function calculateScale(canvas) {
      const windowWidth = window.innerWidth;
      const windowHeight = window.innerHeight;
      
      const scaleX = windowWidth / DESIGN_WIDTH;
      const scaleY = windowHeight / DESIGN_HEIGHT;
      const scale = Math.min(scaleX, scaleY);
      
      const offsetX = (windowWidth - DESIGN_WIDTH * scale) / 2;
      const offsetY = (windowHeight - DESIGN_HEIGHT * scale) / 2;
      
      return { scale, offsetX, offsetY };
    }
  </script>

  <!-- ENTITY MANAGER -->
  <script>
    const EntityManager = {
      entities: new Map(),
      plants: new Set(),
      zombies: new Set(),
      projectiles: new Set(),
      suns: new Set(),
      nextId: 1,
      
      create(type) {
        const entity = { 
          id: this.nextId++, 
          type, 
          active: true,
          animationFrame: 0
        };
        this.entities.set(entity.id, entity);
        
        const collectionName = type + 's';
        if (this[collectionName]) {
          this[collectionName].add(entity);
        }
        
        return entity;
      },
      
      destroy(entity) {
        if (!entity) return;
        entity.active = false;
        this.entities.delete(entity.id);
        
        const collectionName = entity.type + 's';
        if (this[collectionName]) {
          this[collectionName].delete(entity);
        }
      },
      
      getByType(type) {
        const collectionName = type + 's';
        return this[collectionName] || new Set();
      },

      clear() {
        this.entities.clear();
        this.plants.clear();
        this.zombies.clear();
        this.projectiles.clear();
        this.suns.clear();
        this.nextId = 1;
      }
    };
  </script>

  <!-- PARTICLE SYSTEM -->
  <script>
    const ParticleSystem = {
      particles: [],
      
      createHitParticles(x, y, color, count = 6) {
        for (let i = 0; i < count; i++) {
          this.particles.push({
            x, y,
            vx: (Math.random() - 0.5) * 120,
            vy: (Math.random() - 0.5) * 120 - 60,
            life: 1,
            maxLife: 0.5 + Math.random() * 0.5,
            color,
            size: 3 + Math.random() * 5
          });
        }
      },
      
      createZombieDeathParticles(x, y) {
        this.createHitParticles(x, y, COLORS.zombie.skin, 12);
        this.createHitParticles(x, y, COLORS.zombie.suit, 8);
      },
      
      update(deltaTime) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
          const p = this.particles[i];
          p.x += p.vx * deltaTime / 1000;
          p.y += p.vy * deltaTime / 1000;
          p.vy += 300 * deltaTime / 1000; // Gravity
          p.life -= deltaTime / (p.maxLife * 1000);
          
          if (p.life <= 0) {
            this.particles.splice(i, 1);
          }
        }
      },
      
      draw(ctx) {
        for (const p of this.particles) {
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    };
  </script>

  <!-- SUN SYSTEM -->
  <script>
    const SunSystem = {
      nextNaturalSunTime: 0,
      
      init() {
        this.nextNaturalSunTime = performance.now() + 3000; // First sun after 3s
      },
      
      reset() {
        this.nextNaturalSunTime = performance.now() + 3000;
      },
      
      update(deltaTime, currentTime) {
        // Spawn natural sun
        if (currentTime >= this.nextNaturalSunTime) {
          this.spawnNaturalSun();
          this.nextNaturalSunTime = currentTime + 
            NATURAL_SUN_CONFIG.interval + 
            (Math.random() * 2 - 1) * NATURAL_SUN_CONFIG.intervalVariance;
        }
        
        // Update existing sun entities
        for (const sun of EntityManager.getByType('sun')) {
          this.updateSun(sun, deltaTime, currentTime);
        }
      },
      
      updateSun(sun, deltaTime, currentTime) {
        sun.animationFrame += deltaTime * 0.005;
        
        if (sun.sun.type === SUN_TYPES.NATURAL) {
          // Fall until reaching target Y
          if (sun.transform.y < sun.sun.targetY) {
            sun.transform.y += NATURAL_SUN_CONFIG.fallSpeed * (deltaTime / 1000);
          }
          // Horizontal drift
          sun.render.driftOffset = Math.sin(sun.animationFrame) * NATURAL_SUN_CONFIG.drift;
        } else if (sun.sun.type === SUN_TYPES.PLANT) {
          // Plant sun floats upward after delay
          if (currentTime > sun.sun.spawnTime + 5000) {
            sun.transform.y -= 20 * (deltaTime / 1000);
          }
        }
        
        // Auto collect at 50% value
        if (currentTime > sun.sun.autoCollectTime && !sun.sun.isCollected) {
          Game.addSun(Math.floor(sun.sun.value * 0.5));
          EntityManager.destroy(sun);
        }
        
        // Despawn
        if (currentTime > sun.sun.despawnTime) {
          EntityManager.destroy(sun);
        }
      },
      
      spawnNaturalSun() {
        const lx = LAYOUT.UI_LEFT_MARGIN;
        const lw = LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH;
        const x = lx + Math.random() * lw;
        const targetY = LAYOUT.UI_TOP_MARGIN + (LAYOUT.LANES * LAYOUT.CELL_HEIGHT) - 30;
        
        this.createSun(SUN_TYPES.NATURAL, x, LAYOUT.UI_TOP_MARGIN - 30, targetY);
      },
      
      spawnPlantSun(x, y, value = 50) {
        this.createSun(SUN_TYPES.PLANT, x, y - 40, null, value);
      },
      
      createSun(type, x, y, targetY, value = NATURAL_SUN_CONFIG.value) {
        const currentTime = performance.now();
        const sun = EntityManager.create('sun');
        
        sun.transform = { x, y };
        sun.sun = {
          type,
          value: value,
          spawnTime: currentTime,
          autoCollectTime: currentTime + NATURAL_SUN_CONFIG.autoCollectTime,
          despawnTime: currentTime + NATURAL_SUN_CONFIG.despawnTime,
          targetY,
          isCollected: false
        };
        sun.render = {
          driftOffset: 0,
          pulsePhase: Math.random() * Math.PI * 2
        };
        
        return sun;
      },
      
      collectSun(sun) {
        if (sun.sun.isCollected) return false;
        sun.sun.isCollected = true;
        Game.addSun(sun.sun.value);
        EntityManager.destroy(sun);
        return true;
      },
      
      checkClick(x, y) {
        for (const sun of EntityManager.getByType('sun')) {
          if (!sun.active || sun.sun.isCollected) continue;
          
          const dx = x - (sun.transform.x + sun.render.driftOffset);
          const dy = y - sun.transform.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 30) {
            return sun;
          }
        }
        return null;
      }
    };

    function drawSun(ctx, sun) {
      const { x, y } = sun.transform;
      const pulse = Math.sin(sun.animationFrame * 2 + sun.render.pulsePhase) * 0.1 + 1;
      const c = COLORS.sun;
      
      ctx.save();
      ctx.translate(x + sun.render.driftOffset, y);
      ctx.scale(pulse, pulse);
      
      // Outer glow
      ctx.fillStyle = c.outerGlow;
      ctx.beginPath();
      ctx.arc(0, 0, 25, 0, Math.PI * 2);
      ctx.fill();
      
      // Middle glow
      ctx.fillStyle = c.glow;
      ctx.beginPath();
      ctx.arc(0, 0, 18, 0, Math.PI * 2);
      ctx.fill();
      
      // Core
      ctx.fillStyle = c.core;
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Rays
      ctx.strokeStyle = c.ray;
      ctx.lineWidth = 3;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2 + sun.animationFrame;
        ctx.beginPath();
        ctx.moveTo(Math.cos(angle) * 15, Math.sin(angle) * 15);
        ctx.lineTo(Math.cos(angle) * 22, Math.sin(angle) * 22);
        ctx.stroke();
      }
      
      // Value text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(sun.sun.value, 0, 0);
      
      ctx.restore();
    }
  </script>

  <!-- PLANT SYSTEM -->
  <script>
    function createPlant(typeId, gridX, gridY, grid) {
      const type = PLANT_TYPES[typeId];
      if (!type) return null;

      const pos = gridToPixel(gridX, gridY);
      const plant = EntityManager.create('plant');
      
      plant.transform = { x: pos.x, y: pos.y, width: type.width, height: type.height };
      plant.health = { current: type.health, max: type.health };
      plant.plant = { 
        type: typeId, 
        gridX, 
        gridY, 
        cooldown: type.cooldown, 
        lastShot: 0,
        nextProduceTime: type.behavior === 'producer' ? performance.now() + 5000 : 0
      };
      plant.render = { flashTime: 0, damageState: 'full' };
      
      grid[gridY][gridX] = plant;
      return plant;
    }

    function hasZombieInLane(lane, fromX) {
      for (const zombie of EntityManager.getByType('zombie')) {
        if (!zombie.active) continue;
        if (zombie.zombie.lane === lane && zombie.transform.x > fromX) {
          return true;
        }
      }
      return false;
    }

    function updatePlants(currentTime, deltaTime) {
      for (const plant of EntityManager.getByType('plant')) {
        if (!plant.active) continue;
        
        plant.animationFrame += deltaTime * 0.06;
        if (plant.render.flashTime > 0) plant.render.flashTime -= deltaTime;
        
        const type = PLANT_TYPES[plant.plant.type];
        
        // Shooter behavior
        if (type.behavior === 'shooter' && type.projectile) {
          if (currentTime - plant.plant.lastShot >= type.cooldown) {
            if (hasZombieInLane(plant.plant.gridY, plant.transform.x)) {
              shootProjectile(plant);
              plant.plant.lastShot = currentTime;
            }
          }
        }
        
        // Producer behavior (Sunflower)
        if (type.behavior === 'producer') {
          if (currentTime >= plant.plant.nextProduceTime) {
            SunSystem.spawnPlantSun(plant.transform.x, plant.transform.y, type.sunValue);
            plant.plant.nextProduceTime = currentTime + type.produceInterval;
          }
        }
        
        // Defender behavior (Wall-nut) - update damage state visual
        if (type.behavior === 'defender') {
          const healthPct = plant.health.current / plant.health.max;
          if (healthPct > 0.66) {
            plant.render.damageState = 'full';
          } else if (healthPct > 0.33) {
            plant.render.damageState = 'cracked';
          } else {
            plant.render.damageState = 'broken';
          }
        }
      }
    }

    // Detailed Peashooter Drawing
    function drawPeashooterBackLeaves(ctx) {
      const c = COLORS.peashooter;
      ctx.fillStyle = c.leaf;
      
      ctx.beginPath();
      ctx.ellipse(-18, 22, 14, 20, -0.6, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.beginPath();
      ctx.ellipse(16, 20, 12, 17, 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPeashooterStem(ctx) {
      const c = COLORS.peashooter;
      ctx.strokeStyle = c.stem;
      ctx.lineWidth = 14;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(0, 22);
      ctx.quadraticCurveTo(-6, 0, 0, -28);
      ctx.stroke();
      
      ctx.strokeStyle = c.bodyLight;
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(-4, 20);
      ctx.quadraticCurveTo(-9, 0, -4, -26);
      ctx.stroke();
    }

    function drawPeashooterHead(ctx, isFlashing) {
      const c = COLORS.peashooter;
      const x = 0, y = -38;
      
      // Back of head
      ctx.fillStyle = isFlashing ? '#fff' : c.bodyDark;
      ctx.beginPath();
      ctx.ellipse(x, y, 20, 24, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Mouth interior (dark hole)
      ctx.fillStyle = c.mouthDark;
      ctx.beginPath();
      ctx.ellipse(x + 14, y, 11, 16, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Main head with gradient
      const grad = ctx.createLinearGradient(x - 18, y - 25, x + 18, y + 20);
      grad.addColorStop(0, isFlashing ? '#fff' : c.bodyDark);
      grad.addColorStop(0.5, isFlashing ? '#fff' : c.bodyMain);
      grad.addColorStop(1, isFlashing ? '#fff' : c.bodyLight);
      
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(x, y, 22, 27, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Mouth lip
      ctx.fillStyle = isFlashing ? '#fff' : c.head;
      ctx.beginPath();
      ctx.ellipse(x + 14, y, 13, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = c.mouth;
      ctx.beginPath();
      ctx.ellipse(x + 16, y, 9, 13, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPeashooterFace(ctx, isFlashing) {
      const c = COLORS.peashooter;
      
      // Eyes
      ctx.fillStyle = c.eyeWhite;
      ctx.beginPath();
      ctx.ellipse(-6, -45, 7, 9, -0.2, 0, Math.PI * 2);
      ctx.ellipse(8, -47, 7, 9, 0.2, 0, Math.PI * 2);
      ctx.fill();
      
      // Pupils (looking right at zombies)
      ctx.fillStyle = c.eyePupil;
      ctx.beginPath();
      ctx.arc(-3, -45, 3.5, 0, Math.PI * 2);
      ctx.arc(11, -47, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(-5, -47, 2, 0, Math.PI * 2);
      ctx.arc(9, -49, 2, 0, Math.PI * 2);
      ctx.fill();
      
      // Cheeks
      if (!isFlashing) {
        ctx.fillStyle = c.cheek;
        ctx.globalAlpha = 0.4;
        ctx.beginPath();
        ctx.arc(-14, -35, 6, 0, Math.PI * 2);
        ctx.arc(16, -37, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      
      // Eyebrows
      ctx.strokeStyle = isFlashing ? '#999' : c.bodyDark;
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(-12, -54);
      ctx.lineTo(-2, -51);
      ctx.moveTo(3, -53);
      ctx.lineTo(13, -56);
      ctx.stroke();
    }

    function drawPeashooterFrontLeaves(ctx) {
      const c = COLORS.peashooter;
      ctx.fillStyle = c.leafLight;
      
      ctx.beginPath();
      ctx.ellipse(0, 24, 16, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.strokeStyle = c.leaf;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, 8);
      ctx.lineTo(0, 40);
      ctx.moveTo(0, 22);
      ctx.lineTo(-10, 16);
      ctx.moveTo(0, 22);
      ctx.lineTo(10, 16);
      ctx.moveTo(0, 30);
      ctx.lineTo(-10, 36);
      ctx.moveTo(0, 30);
      ctx.lineTo(10, 36);
      ctx.stroke();
    }

    function drawPeashooter(ctx, x, y, animFrame, isFlashing) {
      ctx.save();
      ctx.translate(x, y);
      
      // Idle bob
      const bob = Math.sin(animFrame * 0.08) * 2;
      ctx.translate(0, bob);
      
      drawPeashooterBackLeaves(ctx);
      drawPeashooterStem(ctx);
      drawPeashooterHead(ctx, isFlashing);
      drawPeashooterFace(ctx, isFlashing);
      drawPeashooterFrontLeaves(ctx);
      
      ctx.restore();
    }

    function drawShadow(ctx, x, y, width) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.ellipse(x, y + 28, width / 2, width / 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Sunflower Drawing
    function drawSunflower(ctx, x, y, animFrame, isFlashing) {
      const c = COLORS.sunflower;
      
      ctx.save();
      ctx.translate(x, y);
      
      // Idle sway
      const sway = Math.sin(animFrame * 0.05) * 0.05;
      ctx.rotate(sway);
      
      // Stem
      ctx.strokeStyle = c.stem;
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.moveTo(0, 25);
      ctx.quadraticCurveTo(-3, 0, 0, -20);
      ctx.stroke();
      
      // Leaves at base
      ctx.fillStyle = c.leaf;
      ctx.beginPath();
      ctx.ellipse(-12, 18, 10, 6, -0.5, 0, Math.PI * 2);
      ctx.ellipse(12, 18, 10, 6, 0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Flower head
      ctx.translate(0, -22);
      
      // Petals (8 petals)
      ctx.fillStyle = isFlashing ? '#fff' : c.petal;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        ctx.save();
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, -18, 7, 14, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      
      // Center face
      ctx.fillStyle = c.center;
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Eyes
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-4, -2, 2.5, 0, Math.PI * 2);
      ctx.arc(4, -2, 2.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Smile
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(0, 1, 5, 0.2, Math.PI - 0.2);
      ctx.stroke();
      
      ctx.restore();
    }

    // Wall-nut Drawing
    function drawWallnut(ctx, x, y, damageState, isFlashing) {
      const c = COLORS.wallnut;
      
      ctx.save();
      ctx.translate(x, y);
      
      // Shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.ellipse(0, 28, 22, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Main nut body
      const nutGrad = ctx.createRadialGradient(-8, -10, 5, 0, 0, 28);
      nutGrad.addColorStop(0, isFlashing ? '#fff' : c.light);
      nutGrad.addColorStop(0.6, isFlashing ? '#fff' : c.medium);
      nutGrad.addColorStop(1, isFlashing ? '#ddd' : c.dark);
      
      ctx.fillStyle = nutGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 26, 30, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Crack details based on damage state
      if (damageState === 'cracked' || damageState === 'broken') {
        ctx.strokeStyle = c.dark;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-15, -10);
        ctx.lineTo(-5, 5);
        ctx.lineTo(-12, 15);
        ctx.stroke();
      }
      
      if (damageState === 'broken') {
        ctx.beginPath();
        ctx.moveTo(10, -15);
        ctx.lineTo(18, -5);
        ctx.lineTo(12, 10);
        ctx.stroke();
        
        // Chipped piece missing
        ctx.fillStyle = c.dark;
        ctx.beginPath();
        ctx.arc(20, -5, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Face (worried expression)
      ctx.fillStyle = '#3e2723';
      // Left eye
      ctx.beginPath();
      ctx.arc(-8, -5, 3, 0, Math.PI * 2);
      ctx.fill();
      // Right eye
      ctx.beginPath();
      ctx.arc(8, -5, 3, 0, Math.PI * 2);
      ctx.fill();
      
      // Worried eyebrows
      ctx.strokeStyle = '#3e2723';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-12, -10);
      ctx.lineTo(-4, -8);
      ctx.moveTo(12, -10);
      ctx.lineTo(4, -8);
      ctx.stroke();
      
      // Mouth (worried line)
      ctx.beginPath();
      ctx.moveTo(-5, 8);
      ctx.quadraticCurveTo(0, 5, 5, 8);
      ctx.stroke();
      
      ctx.restore();
    }

    function drawPlant(ctx, plant) {
      if (!plant.active) return;
      
      const { x, y } = plant.transform;
      const isFlashing = plant.render.flashTime > 0;
      const typeId = plant.plant.type;
      
      // Shadow
      drawShadow(ctx, x, y, 50);
      
      // Draw based on plant type
      if (typeId === 'PEASHOOTER') {
        drawPeashooter(ctx, x, y, plant.animationFrame, isFlashing);
      } else if (typeId === 'SUNFLOWER') {
        drawSunflower(ctx, x, y, plant.animationFrame, isFlashing);
      } else if (typeId === 'WALLNUT') {
        drawWallnut(ctx, x, y, plant.render.damageState, isFlashing);
      }
      
      // Health bar
      const healthPct = plant.health.current / plant.health.max;
      if (healthPct < 1) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(x - 18, y - 55, 36, 7);
        ctx.fillStyle = healthPct > 0.5 ? '#4caf50' : '#f44336';
        ctx.fillRect(x - 17, y - 54, 34 * healthPct, 5);
      }
    }
  </script>

  <!-- PROJECTILE SYSTEM -->
  <script>
    function createProjectile(typeId, x, y, lane) {
      const type = PROJECTILE_TYPES[typeId];
      if (!type) return null;
      
      const projectile = EntityManager.create('projectile');
      projectile.transform = { x, y, width: type.radius * 2, height: type.radius * 2 };
      projectile.projectile = { type: typeId, lane, speed: type.speed, damage: type.damage };
      projectile.render = { radius: type.radius };
      
      return projectile;
    }

    function shootProjectile(plant) {
      const type = PLANT_TYPES[plant.plant.type];
      if (!type?.projectile) return;
      createProjectile(type.projectile, plant.transform.x + 20, plant.transform.y - 5, plant.plant.gridY);
    }

    function checkProjectileCollision(projectile) {
      const lane = projectile.projectile.lane;
      const projX = projectile.transform.x;
      const projRadius = projectile.render.radius;
      
      for (const zombie of EntityManager.getByType('zombie')) {
        if (!zombie.active || zombie.zombie.lane !== lane || zombie.zombie.state === ZOMBIE_STATES.DYING) continue;
        
        const distance = Math.abs(projX - zombie.transform.x);
        if (distance < projRadius + 22) return zombie;
      }
      return null;
    }

    function updateProjectiles(deltaTime, maxX) {
      for (const projectile of EntityManager.getByType('projectile')) {
        if (!projectile.active) continue;
        
        projectile.transform.x += projectile.projectile.speed * (deltaTime / 1000);
        
        const hitZombie = checkProjectileCollision(projectile);
        if (hitZombie) {
          damageEntity(hitZombie, projectile.projectile.damage);
          ParticleSystem.createHitParticles(projectile.transform.x, projectile.transform.y, COLORS.pea.main, 4);
          EntityManager.destroy(projectile);
        } else if (projectile.transform.x > maxX) {
          EntityManager.destroy(projectile);
        }
      }
    }

    function drawProjectile(ctx, projectile) {
      if (!projectile.active) return;
      
      const { x, y } = projectile.transform;
      const c = COLORS.pea;
      
      ctx.save();
      ctx.translate(x, y);
      
      // Motion blur trail
      const trailGrad = ctx.createLinearGradient(-22, 0, -5, 0);
      trailGrad.addColorStop(0, 'rgba(118, 255, 3, 0)');
      trailGrad.addColorStop(1, 'rgba(118, 255, 3, 0.6)');
      ctx.fillStyle = trailGrad;
      ctx.beginPath();
      ctx.ellipse(-12, 0, 16, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Outer glow
      ctx.fillStyle = c.glow;
      ctx.beginPath();
      ctx.arc(0, 0, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Main sphere
      const peaGrad = ctx.createRadialGradient(-3, -3, 2, 0, 0, 9);
      peaGrad.addColorStop(0, c.core);
      peaGrad.addColorStop(0.6, c.main);
      peaGrad.addColorStop(1, c.shadow);
      
      ctx.fillStyle = peaGrad;
      ctx.beginPath();
      ctx.arc(0, 0, 9, 0, Math.PI * 2);
      ctx.fill();
      
      // Highlight
      ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
      ctx.beginPath();
      ctx.arc(-3, -3, 3.5, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
  </script>

  <!-- ZOMBIE SYSTEM -->
  <script>
    function createZombie(typeId, lane) {
      const type = ZOMBIE_TYPES[typeId];
      if (!type) return null;

      const startX = LAYOUT.UI_LEFT_MARGIN + LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH + 60;
      // Position feet in bottom 15% of the tile
      const tileBottom = LAYOUT.UI_TOP_MARGIN + (lane + 1) * LAYOUT.CELL_HEIGHT;
      const feetY = tileBottom - (LAYOUT.CELL_HEIGHT * 0.15);
      
      const zombie = EntityManager.create('zombie');
      zombie.transform = { x: startX, y: feetY, width: type.width, height: type.height };
      zombie.health = { current: type.health, max: type.health };
      zombie.zombie = {
        type: typeId, lane, state: ZOMBIE_STATES.WALKING,
        speed: type.speed, damage: type.damage, eatCooldown: type.eatCooldown,
        lastBite: 0, targetPlant: null, deathTime: 0
      };
      zombie.render = { flashTime: 0 };
      
      // Add armor if applicable
      if (type.armor) {
        zombie.armor = {
          type: type.armor.type,
          current: type.armor.health,
          max: type.armor.health,
          isBroken: false
        };
      }
      
      return zombie;
    }

    function getPlantInFront(zombie, grid) {
      const lane = zombie.zombie.lane;
      const zombieX = zombie.transform.x;
      const col = Math.floor((zombieX - LAYOUT.UI_LEFT_MARGIN) / LAYOUT.CELL_WIDTH);
      
      if (col >= 0 && col < LAYOUT.COLUMNS) {
        const plant = grid[lane][col];
        if (plant?.active) {
          const plantPos = gridToPixel(col, lane);
          if (Math.abs(zombieX - plantPos.x) < 30) return plant;
        }
      }
      return null;
    }

    function updateZombieWalking(zombie, deltaTime, currentTime, grid, onGameOver) {
      const plant = getPlantInFront(zombie, grid);
      
      if (plant) {
        zombie.zombie.state = ZOMBIE_STATES.EATING;
        zombie.zombie.targetPlant = plant;
        zombie.zombie.lastBite = currentTime;
      } else {
        zombie.transform.x -= zombie.zombie.speed * (deltaTime / 1000);
        if (zombie.transform.x < LAYOUT.UI_LEFT_MARGIN - 60) onGameOver();
      }
    }

    function updateZombieEating(zombie, currentTime) {
      const plant = zombie.zombie.targetPlant;
      
      if (!plant || !plant.active) {
        zombie.zombie.state = ZOMBIE_STATES.WALKING;
        zombie.zombie.targetPlant = null;
        return;
      }
      
      if (currentTime - zombie.zombie.lastBite >= zombie.zombie.eatCooldown) {
        damageEntity(plant, zombie.zombie.damage);
        zombie.zombie.lastBite = currentTime;
      }
    }

    function updateZombieDying(zombie, currentTime) {
      const elapsed = currentTime - zombie.zombie.deathTime;
      if (elapsed >= 500) {
        ParticleSystem.createZombieDeathParticles(zombie.transform.x, zombie.transform.y);
        EntityManager.destroy(zombie);
      }
    }

    function updateZombies(deltaTime, currentTime, grid, onGameOver) {
      for (const zombie of EntityManager.getByType('zombie')) {
        if (!zombie.active) continue;
        
        zombie.animationFrame += deltaTime * 0.06;
        if (zombie.render.flashTime > 0) zombie.render.flashTime -= deltaTime;
        
        switch (zombie.zombie.state) {
          case ZOMBIE_STATES.WALKING:
            updateZombieWalking(zombie, deltaTime, currentTime, grid, onGameOver);
            break;
          case ZOMBIE_STATES.EATING:
            updateZombieEating(zombie, currentTime);
            break;
          case ZOMBIE_STATES.DYING:
            updateZombieDying(zombie, currentTime);
            break;
        }
      }
    }

    // Detailed Zombie Drawing - Scaled down 25% and with foot drop shadow
    function drawZombieFootShadow(ctx) {
      // Drop shadow beneath feet - transparent circle
      ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
      ctx.beginPath();
      ctx.ellipse(0, 0, 28, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawZombieLegs(ctx, animFrame, isFlashing) {
      const c = COLORS.zombie;
      const walkCycle = Math.sin(animFrame * 0.15);
      
      // Left leg - scaled down
      ctx.fillStyle = isFlashing ? '#fff' : c.pants;
      ctx.save();
      ctx.translate(-9, 24);
      ctx.rotate(walkCycle * 0.25);
      ctx.fillRect(-7, 0, 14, 32);
      ctx.fillStyle = '#212121';
      ctx.fillRect(-8, 29, 17, 8);
      ctx.restore();
      
      // Right leg - scaled down
      ctx.fillStyle = isFlashing ? '#fff' : c.pants;
      ctx.save();
      ctx.translate(9, 24);
      ctx.rotate(-walkCycle * 0.25);
      ctx.fillRect(-7, 0, 14, 32);
      ctx.fillStyle = '#212121';
      ctx.fillRect(-8, 29, 17, 8);
      ctx.restore();
    }

    function drawZombieBody(ctx, isFlashing) {
      const c = COLORS.zombie;
      
      const bodyGrad = ctx.createLinearGradient(-17, -15, 17, 15);
      bodyGrad.addColorStop(0, isFlashing ? '#fff' : c.suitDark);
      bodyGrad.addColorStop(0.5, isFlashing ? '#fff' : c.suit);
      bodyGrad.addColorStop(1, isFlashing ? '#fff' : c.suitLight);
      
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.roundRect(-18, -9, 36, 36, 5);
      ctx.fill();
      
      // Shirt
      ctx.fillStyle = c.shirt;
      ctx.beginPath();
      ctx.moveTo(-9, -9);
      ctx.lineTo(9, -9);
      ctx.lineTo(0, 14);
      ctx.closePath();
      ctx.fill();
      
      // Lapels
      ctx.fillStyle = isFlashing ? '#ddd' : c.suitDark;
      ctx.beginPath();
      ctx.moveTo(-18, -9);
      ctx.lineTo(-5, 14);
      ctx.lineTo(-18, 17);
      ctx.closePath();
      ctx.fill();
      
      ctx.beginPath();
      ctx.moveTo(18, -9);
      ctx.lineTo(5, 14);
      ctx.lineTo(18, 17);
      ctx.closePath();
      ctx.fill();
    }

    function drawZombieTie(ctx) {
      const c = COLORS.zombie;
      ctx.fillStyle = c.tie;
      ctx.beginPath();
      ctx.moveTo(-5, -8);
      ctx.lineTo(5, -8);
      ctx.lineTo(3, 5);
      ctx.lineTo(0, 22);
      ctx.lineTo(-3, 5);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = c.tieDark;
      ctx.beginPath();
      ctx.moveTo(0, -8);
      ctx.lineTo(3, 5);
      ctx.lineTo(0, 22);
      ctx.lineTo(-1, 5);
      ctx.closePath();
      ctx.fill();
    }

    function drawZombieHead(ctx, animFrame, isFlashing) {
      const c = COLORS.zombie;
      const headBob = Math.sin(animFrame * 0.1) * 1.5;
      
      ctx.save();
      ctx.translate(0, -29 + headBob);
      
      const headGrad = ctx.createRadialGradient(-9, -14, 4, 0, 0, 29);
      headGrad.addColorStop(0, isFlashing ? '#fff' : c.skinHighlight);
      headGrad.addColorStop(0.5, isFlashing ? '#fff' : c.skin);
      headGrad.addColorStop(1, isFlashing ? '#ddd' : c.skinShadow);
      
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, 23, 26, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Hair
      ctx.fillStyle = '#424242';
      for (let i = 0; i < 8; i++) {
        const angle = -Math.PI / 2 + (i - 4) * 0.35;
        ctx.beginPath();
        ctx.arc(Math.cos(angle) * 20, Math.sin(angle) * 23, 5, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Eyes
      drawZombieEyes(ctx, isFlashing);
      
      // Nose
      ctx.fillStyle = isFlashing ? '#ddd' : c.skinShadow;
      ctx.beginPath();
      ctx.ellipse(-5, 8, 4, 5, 0.3, 0, Math.PI * 2);
      ctx.fill();
      
      // Mouth
      drawZombieMouth(ctx);
      
      ctx.restore();
    }

    function drawZombieEyes(ctx, isFlashing) {
      const c = COLORS.zombie;
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
      ctx.beginPath();
      ctx.ellipse(-9, -5, 8, 10, 0, 0, Math.PI * 2);
      ctx.ellipse(9, -5, 8, 10, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = c.eyeWhite;
      ctx.beginPath();
      ctx.ellipse(-9, -5, 6, 8, 0, 0, Math.PI * 2);
      ctx.ellipse(9, -5, 6, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = c.eyePupil;
      ctx.beginPath();
      ctx.arc(-11, -5, 2.5, 0, Math.PI * 2);
      ctx.arc(7, -5, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawZombieMouth(ctx) {
      const c = COLORS.zombie;
      ctx.fillStyle = c.mouth;
      ctx.beginPath();
      ctx.ellipse(-5, 17, 11, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = c.teeth;
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(-11 + i * 5.5, 13, 4, 5);
        ctx.fillRect(-11 + i * 5.5, 19, 4, 4);
      }
      
      ctx.fillStyle = '#5d1010';
      ctx.beginPath();
      ctx.ellipse(-5, 19, 5.5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawZombieArms(ctx, animFrame, state, isFlashing) {
      const c = COLORS.zombie;
      const swing = Math.sin(animFrame * 0.15);
      
      // Back arm
      ctx.save();
      ctx.translate(-17, 0);
      ctx.rotate(swing * 0.3 + Math.PI);
      ctx.fillStyle = isFlashing ? '#fff' : c.suit;
      ctx.fillRect(-7, 0, 14, 29);
      ctx.fillStyle = isFlashing ? '#fff' : c.skin;
      ctx.beginPath();
      ctx.ellipse(0, 32, 7, 8, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      
      // Front arm
      let rotation = swing * 0.3;
      if (state === ZOMBIE_STATES.EATING) rotation = -0.9;
      
      ctx.save();
      ctx.translate(17, 0);
      ctx.rotate(rotation);
      ctx.fillStyle = isFlashing ? '#fff' : c.suit;
      ctx.fillRect(-7, 0, 14, 17);
      ctx.fillStyle = isFlashing ? '#ddd' : c.suitDark;
      ctx.fillRect(-6, 15, 12, 15);
      ctx.fillStyle = isFlashing ? '#fff' : c.skin;
      ctx.beginPath();
      ctx.ellipse(0, 33, 8, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Armor Drawing Functions
    function drawCone(ctx, armorPct, isFlashing) {
      const c = COLORS.armor.cone;
      
      ctx.save();
      ctx.translate(0, -32); // On top of head, slightly higher
      ctx.scale(1.2, 1.2); // Make it 20% larger
      
      // Cone gradient
      const coneGrad = ctx.createLinearGradient(-12, -25, 12, 10);
      coneGrad.addColorStop(0, isFlashing ? '#fff' : c.light);
      coneGrad.addColorStop(0.5, isFlashing ? '#fff' : c.main);
      coneGrad.addColorStop(1, isFlashing ? '#ddd' : c.dark);
      
      ctx.fillStyle = coneGrad;
      ctx.beginPath();
      ctx.moveTo(-15, 10);
      ctx.lineTo(0, -35);
      ctx.lineTo(15, 10);
      ctx.closePath();
      ctx.fill();
      
      // Cone stripes
      ctx.strokeStyle = c.dark;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-10, -5);
      ctx.lineTo(10, -5);
      ctx.moveTo(-6, -20);
      ctx.lineTo(6, -20);
      ctx.stroke();
      
      // Damage cracks if low health
      if (armorPct < 0.5) {
        ctx.strokeStyle = '#8b4513';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(-5, -15);
        ctx.lineTo(0, -10);
        ctx.lineTo(5, -18);
        ctx.stroke();
      }
      
      ctx.restore();
    }

    function drawBucket(ctx, armorPct, isFlashing) {
      const c = COLORS.armor.bucket;
      
      ctx.save();
      ctx.translate(0, -28); // Covering head, slightly higher
      ctx.scale(1.15, 1.15); // Make it 15% larger
      
      // Bucket gradient
      const bucketGrad = ctx.createLinearGradient(-15, -30, 15, 15);
      bucketGrad.addColorStop(0, isFlashing ? '#fff' : c.light);
      bucketGrad.addColorStop(0.4, isFlashing ? '#fff' : c.main);
      bucketGrad.addColorStop(1, isFlashing ? '#ddd' : c.dark);
      
      ctx.fillStyle = bucketGrad;
      ctx.beginPath();
      ctx.roundRect(-16, -30, 32, 45, 3);
      ctx.fill();
      
      // Bucket rim
      ctx.fillStyle = isFlashing ? '#fff' : c.dark;
      ctx.fillRect(-18, -5, 36, 6);
      
      // Dents based on damage
      if (armorPct < 0.7) {
        ctx.fillStyle = c.dark;
        ctx.beginPath();
        ctx.ellipse(-8, -15, 4, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      
      if (armorPct < 0.3) {
        ctx.beginPath();
        ctx.ellipse(10, -20, 3, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Large dent
        ctx.beginPath();
        ctx.arc(12, -10, 6, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    }

    function drawZombie(ctx, zombie) {
      if (!zombie.active) return;
      
      const { x, y } = zombie.transform;
      const isFlashing = zombie.render.flashTime > 0;
      const isDying = zombie.zombie.state === ZOMBIE_STATES.DYING;
      
      ctx.save();
      ctx.translate(x, y);
      
      // Draw drop shadow at feet (at 0, 0 relative to transform)
      drawZombieFootShadow(ctx);
      
      // Offset upward so feet are at transform position
      const feetOffset = -38;
      ctx.translate(0, feetOffset);
      
      if (isDying) {
        const elapsed = performance.now() - zombie.zombie.deathTime;
        const progress = elapsed / 500;
        ctx.globalAlpha = 1 - progress;
        ctx.translate(0, progress * 25);
        ctx.rotate(progress * 0.5);
      }
      
      if (zombie.zombie.state === ZOMBIE_STATES.EATING) {
        ctx.rotate(0.12);
        ctx.translate(5, 0);
      }
      
      const bob = zombie.zombie.state === ZOMBIE_STATES.WALKING 
        ? Math.abs(Math.sin(zombie.animationFrame * 0.15)) * 2.5 
        : 0;
      ctx.translate(0, -bob);
      
      drawZombieArms(ctx, zombie.animationFrame, zombie.zombie.state, isFlashing);
      drawZombieLegs(ctx, zombie.animationFrame, isFlashing);
      drawZombieBody(ctx, isFlashing);
      drawZombieTie(ctx);
      drawZombieHead(ctx, zombie.animationFrame, isFlashing);
      
      // Draw armor if present (AFTER head so it renders on top)
      if (zombie.armor && !zombie.armor.isBroken) {
        const armorPct = zombie.armor.current / zombie.armor.max;
        if (zombie.armor.type === 'cone') {
          drawCone(ctx, armorPct, isFlashing);
        } else if (zombie.armor.type === 'bucket') {
          drawBucket(ctx, armorPct, isFlashing);
        }
      }
      
      ctx.restore();
      
      // Health bar - show armor health if present, otherwise zombie health
      let displayHealth, displayMax, displayColor;
      if (zombie.armor && !zombie.armor.isBroken) {
        displayHealth = zombie.armor.current;
        displayMax = zombie.armor.max;
        displayColor = zombie.armor.type === 'cone' ? '#ff9800' : '#9e9e9e';
      } else {
        displayHealth = zombie.health.current;
        displayMax = zombie.health.max;
        displayColor = displayHealth / displayMax > 0.5 ? '#4caf50' : '#f44336';
      }
      
      const healthPct = displayHealth / displayMax;
      if ((healthPct < 1 || zombie.armor) && !isDying) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.fillRect(x - 18, y + feetOffset - 50, 36, 6);
        ctx.fillStyle = displayColor;
        ctx.fillRect(x - 17, y + feetOffset - 49, 34 * healthPct, 4);
      }
    }
  </script>

  <!-- COMBAT SYSTEM -->
  <script>
    function damageEntity(entity, amount) {
      if (!entity?.active) return;
      
      // Check if entity has armor
      if (entity.armor && entity.armor.current > 0 && !entity.armor.isBroken) {
        // Damage armor first
        entity.armor.current -= amount;
        
        // Spawn armor hit particles
        const armorColor = entity.armor.type === 'cone' ? COLORS.armor.cone.main : COLORS.armor.bucket.main;
        ParticleSystem.createHitParticles(entity.transform.x, entity.transform.y - 30, armorColor, 3);
        
        if (entity.armor.current <= 0) {
          // Armor broke!
          entity.armor.isBroken = true;
          // Create armor break particles
          ParticleSystem.createHitParticles(entity.transform.x, entity.transform.y - 40, armorColor, 8);
        }
        return; // Don't damage health while armor exists
      }
      
      entity.health.current -= amount;
      if (entity.render) entity.render.flashTime = 120;
      
      if (entity.health.current <= 0) killEntity(entity);
    }

    function killEntity(entity) {
      if (!entity) return;
      
      if (entity.type === 'zombie') {
        entity.zombie.state = ZOMBIE_STATES.DYING;
        entity.zombie.deathTime = performance.now();
      } else if (entity.type === 'plant') {
        EntityManager.destroy(entity);
      }
    }
  </script>

  <script>
    const Spawner = {
      spawnInterval: 4500,
      lastSpawn: 0,
      zombieSpawnCount: 0,
      
      update(currentTime) {
        if (currentTime - this.lastSpawn >= this.spawnInterval) {
          this.spawnZombie();
          this.lastSpawn = currentTime;
        }
      },
      
      spawnZombie() {
        const lane = Math.floor(Math.random() * LAYOUT.LANES);
        this.zombieSpawnCount++;
        
        // Spawn pattern: mix of basic, conehead, and buckethead
        const rand = Math.random();
        let type = 'BASIC';
        
        // Every 5th zombie has a chance to be armored
        if (this.zombieSpawnCount % 5 === 0) {
          if (rand < 0.3) {
            type = 'BUCKETHEAD';
          } else if (rand < 0.7) {
            type = 'CONEHEAD';
          }
        } else if (this.zombieSpawnCount % 3 === 0 && rand < 0.5) {
          type = 'CONEHEAD';
        }
        
        createZombie(type, lane);
      },
      
      reset() { 
        this.lastSpawn = 0; 
        this.zombieSpawnCount = 0;
      }
    };
  </script>

  <!-- INPUT HANDLER -->
  <script>
    const InputHandler = {
      selectedPlant: null,
      mouseX: 0,
      mouseY: 0,
      
      init(canvas) {
        this.canvas = canvas;
        canvas.addEventListener('click', (e) => this.handleClick(e));
        canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
        window.addEventListener('resize', () => Game.handleResize());
      },
      
      handleClick(e) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleData = calculateScale(this.canvas);
        
        const screenX = e.clientX - rect.left;
        const screenY = e.clientY - rect.top;
        
        // Convert to design coordinates
        const designX = (screenX - scaleData.offsetX) / scaleData.scale;
        const designY = (screenY - scaleData.offsetY) / scaleData.scale;
        
        // Check sun collection first (highest priority)
        const clickedSun = SunSystem.checkClick(designX, designY);
        if (clickedSun) {
          SunSystem.collectSun(clickedSun);
          return;
        }
        
        // Check seed packets
        const selected = SeedPacketSystem.handleClick(designX, designY);
        if (selected) {
          this.selectedPlant = selected;
          return;
        }
        
        // Place plant
        if (this.selectedPlant && !Game.gameOver && !Game.victory) {
          const plantType = PLANT_TYPES[this.selectedPlant];
          
          if (Game.canAfford(plantType.cost)) {
            const gridPos = pixelToGrid(designX, designY);
            if (gridPos && canPlacePlant(gridPos.x, gridPos.y, Game.grid)) {
              createPlant(this.selectedPlant, gridPos.x, gridPos.y, Game.grid);
              Game.spendSun(plantType.cost);
              SeedPacketSystem.onPlantPlaced(this.selectedPlant);
              this.selectedPlant = null;
            }
          }
        }
      },
      
      handleMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleData = calculateScale(this.canvas);
        
        this.mouseX = (e.clientX - rect.left - scaleData.offsetX) / scaleData.scale;
        this.mouseY = (e.clientY - rect.top - scaleData.offsetY) / scaleData.scale;
      }
    };
  </script>

  <!-- SEED PACKET SYSTEM -->
  <script>
    const SeedPacketSystem = {
      packets: [
        { type: 'PEASHOOTER', x: 15, y: 10, isSelected: false, cooldownEndTime: 0 },
        { type: 'SUNFLOWER', x: 90, y: 10, isSelected: false, cooldownEndTime: 0 },
        { type: 'WALLNUT', x: 165, y: 10, isSelected: false, cooldownEndTime: 0 }
      ],
      
      update(currentTime) {
        for (const packet of this.packets) {
          const plantType = PLANT_TYPES[packet.type];
          // Check if we can afford it and cooldown is complete
          const canAfford = Game.canAfford(plantType.cost);
          const cooldownComplete = currentTime >= packet.cooldownEndTime;
          packet.isAvailable = canAfford && cooldownComplete;
        }
      },
      
      onPlantPlaced(plantTypeId) {
        const packet = this.packets.find(p => p.type === plantTypeId);
        if (packet) {
          const plantType = PLANT_TYPES[plantTypeId];
          packet.cooldownEndTime = performance.now() + plantType.recharge;
          packet.isSelected = false;
        }
      },
      
      handleClick(x, y) {
        for (const packet of this.packets) {
          const w = 70, h = 90;
          if (x >= packet.x && x <= packet.x + w &&
              y >= packet.y && y <= packet.y + h) {
            
            if (packet.isAvailable) {
              // Toggle selection
              this.packets.forEach(p => p.isSelected = false);
              packet.isSelected = true;
              return packet.type;
            }
          }
        }
        return null;
      },
      
      reset() {
        for (const packet of this.packets) {
          packet.cooldownEndTime = 0;
          packet.isSelected = false;
        }
      }
    };
  </script>

  <!-- BACKGROUND RENDERER -->
  <script>
    // Cached grass blades - generated once
    const cachedGrassBlades = [];
    const cachedBushes = [];
    
    function generateGrassBlades() {
      if (cachedGrassBlades.length > 0) return;
      const lx = LAYOUT.UI_LEFT_MARGIN;
      const ly = LAYOUT.UI_TOP_MARGIN;
      const lw = LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH;
      const lh = LAYOUT.LANES * LAYOUT.CELL_HEIGHT;
      
      for (let i = 0; i < 300; i++) {
        cachedGrassBlades.push({
          x: lx + Math.random() * lw,
          y: ly + Math.random() * lh,
          h: 6 + Math.random() * 12,
          lean: (Math.random() - 0.5) * 5
        });
      }
    }
    
    function generateBushes() {
      if (cachedBushes.length > 0) return;
      
      const bushX = LAYOUT.UI_LEFT_MARGIN + LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH;
      const bushY = LAYOUT.UI_TOP_MARGIN;
      const bushW = DESIGN_WIDTH - bushX;
      const bushH = LAYOUT.LANES * LAYOUT.CELL_HEIGHT;
      
      // Generate 4 layers of bushes
      const bushColors = ['#2e7d32', '#388e3c', '#43a047', '#4caf50'];
      
      for (let layer = 0; layer < 4; layer++) {
        for (let i = 0; i < 15; i++) {
          cachedBushes.push({
            x: bushX + Math.random() * bushW,
            y: bushY + Math.random() * bushH,
            r: 25 + Math.random() * 35,
            color: bushColors[layer],
            isHighlight: false
          });
        }
      }
      
      // Bush highlights
      for (let i = 0; i < 20; i++) {
        cachedBushes.push({
          x: bushX + Math.random() * bushW,
          y: bushY + Math.random() * bushH,
          r: 10 + Math.random() * 15,
          color: '#66bb6a',
          isHighlight: true
        });
      }
    }

    function drawSky(ctx) {
      // Only draw sky above the fence/arena area
      const fenceY = LAYOUT.UI_TOP_MARGIN - 25;
      const grad = ctx.createLinearGradient(0, 0, 0, fenceY);
      grad.addColorStop(0, COLORS.sky.top);
      grad.addColorStop(0.7, COLORS.sky.middle);
      grad.addColorStop(1, COLORS.sky.bottom);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, DESIGN_WIDTH, fenceY);
    }

    function drawPavement(ctx) {
      const c = COLORS.house;
      // Pavement below house (left side)
      const paveX = 0;
      const paveY = LAYOUT.UI_TOP_MARGIN + LAYOUT.LANES * LAYOUT.CELL_HEIGHT;
      const paveW = LAYOUT.UI_LEFT_MARGIN + 20;
      const paveH = DESIGN_HEIGHT - paveY;
      
      ctx.fillStyle = '#757575';
      ctx.fillRect(paveX, paveY, paveW, paveH);
      
      // Pavement stones pattern
      ctx.strokeStyle = '#616161';
      ctx.lineWidth = 1;
      for (let y = paveY; y < DESIGN_HEIGHT; y += 20) {
        ctx.beginPath();
        ctx.moveTo(paveX, y);
        ctx.lineTo(paveW, y);
        ctx.stroke();
      }
      for (let x = paveX; x < paveW; x += 30) {
        ctx.beginPath();
        ctx.moveTo(x, paveY);
        ctx.lineTo(x, DESIGN_HEIGHT);
        ctx.stroke();
      }
      
      // Pavement at bottom of screen (full width)
      const bottomPaveY = LAYOUT.UI_TOP_MARGIN + LAYOUT.LANES * LAYOUT.CELL_HEIGHT;
      const bottomPaveH = DESIGN_HEIGHT - bottomPaveY;
      
      ctx.fillStyle = '#6d6d6d';
      ctx.fillRect(LAYOUT.UI_LEFT_MARGIN, bottomPaveY, DESIGN_WIDTH - LAYOUT.UI_LEFT_MARGIN, bottomPaveH);
      
      // Stone pattern for bottom pavement
      ctx.strokeStyle = '#555';
      for (let y = bottomPaveY; y < DESIGN_HEIGHT; y += 18) {
        ctx.beginPath();
        ctx.moveTo(LAYOUT.UI_LEFT_MARGIN, y);
        ctx.lineTo(DESIGN_WIDTH, y);
        ctx.stroke();
      }
    }

    function drawBushes(ctx) {
      // Draw cached bushes
      for (const bush of cachedBushes) {
        ctx.fillStyle = bush.color;
        ctx.beginPath();
        if (bush.isHighlight) {
          ctx.arc(bush.x, bush.y - bush.r/2, bush.r, 0, Math.PI * 2);
        } else {
          ctx.arc(bush.x, bush.y, bush.r, 0, Math.PI * 2);
        }
        ctx.fill();
      }
    }

    function drawHouse(ctx) {
      const c = COLORS.house;
      const hx = 15, hy = 110, hw = 145, hh = 380;
      
      // Pavement below house
      ctx.fillStyle = '#757575';
      ctx.fillRect(hx - 10, hy + hh, hw + 20, DESIGN_HEIGHT - (hy + hh));
      
      // Wall with siding
      ctx.fillStyle = c.wall;
      ctx.fillRect(hx, hy, hw, hh);
      
      ctx.strokeStyle = c.wallShadow;
      ctx.lineWidth = 1;
      for (let i = 1; i < 13; i++) {
        const y = hy + i * 30;
        ctx.beginPath();
        ctx.moveTo(hx, y);
        ctx.lineTo(hx + hw, y);
        ctx.stroke();
      }
      
      // Roof
      ctx.fillStyle = c.roof;
      ctx.beginPath();
      ctx.moveTo(hx - 12, hy);
      ctx.lineTo(hx + hw / 2, hy - 65);
      ctx.lineTo(hx + hw + 12, hy);
      ctx.closePath();
      ctx.fill();
      
      ctx.fillStyle = c.roofHighlight;
      ctx.beginPath();
      ctx.moveTo(hx + 18, hy - 12);
      ctx.lineTo(hx + hw / 2, hy - 55);
      ctx.lineTo(hx + hw - 18, hy - 12);
      ctx.closePath();
      ctx.fill();
      
      // Windows
      for (let lane = 0; lane < 5; lane++) {
        const wy = hy + 28 + lane * 75;
        ctx.fillStyle = c.trim;
        ctx.fillRect(hx + 22, wy, 42, 55);
        
        const wGrad = ctx.createLinearGradient(hx + 27, wy + 5, hx + 59, wy + 50);
        wGrad.addColorStop(0, c.windowLight);
        wGrad.addColorStop(1, c.window);
        ctx.fillStyle = wGrad;
        ctx.fillRect(hx + 27, wy + 5, 32, 45);
        
        ctx.strokeStyle = c.trim;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(hx + 43, wy + 5);
        ctx.lineTo(hx + 43, wy + 50);
        ctx.moveTo(hx + 27, wy + 27);
        ctx.lineTo(hx + 59, wy + 27);
        ctx.stroke();
      }
      
      // Door
      ctx.fillStyle = c.door;
      ctx.fillRect(hx + 85, hy + 295, 52, 85);
      
      ctx.strokeStyle = c.wallShadow;
      ctx.lineWidth = 2;
      ctx.strokeRect(hx + 90, hy + 300, 20, 35);
      ctx.strokeRect(hx + 112, hy + 300, 20, 35);
      ctx.strokeRect(hx + 90, hy + 340, 20, 35);
      ctx.strokeRect(hx + 112, hy + 340, 20, 35);
      
      ctx.fillStyle = c.doorKnob;
      ctx.beginPath();
      ctx.arc(hx + 130, hy + 338, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFence(ctx) {
      const fx = LAYOUT.UI_LEFT_MARGIN - 60;
      const fy = LAYOUT.UI_TOP_MARGIN - 25;
      const fw = LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH + 120;
      
      ctx.fillStyle = '#a1887f';
      for (let x = fx; x < fx + fw; x += 45) {
        ctx.fillRect(x, fy - 32, 13, 55);
        ctx.beginPath();
        ctx.moveTo(x - 3, fy - 32);
        ctx.lineTo(x + 6.5, fy - 48);
        ctx.lineTo(x + 16, fy - 32);
        ctx.closePath();
        ctx.fill();
      }
      
      ctx.fillStyle = '#8d6e63';
      ctx.fillRect(fx, fy - 12, fw, 9);
      ctx.fillRect(fx, fy + 10, fw, 9);
    }

    function drawLawn(ctx) {
      const c = COLORS.lawn;
      const lx = LAYOUT.UI_LEFT_MARGIN;
      const ly = LAYOUT.UI_TOP_MARGIN;
      const lw = LAYOUT.COLUMNS * LAYOUT.CELL_WIDTH;
      const lh = LAYOUT.LANES * LAYOUT.CELL_HEIGHT;
      
      const grassGrad = ctx.createLinearGradient(0, ly, 0, ly + lh);
      grassGrad.addColorStop(0, c.light);
      grassGrad.addColorStop(1, c.dark);
      ctx.fillStyle = grassGrad;
      ctx.fillRect(lx, ly, lw, lh);
      
      // Draw cached grass blades
      ctx.save();
      ctx.beginPath();
      ctx.rect(lx, ly, lw, lh);
      ctx.clip();
      
      ctx.strokeStyle = c.highlight;
      ctx.lineWidth = 2;
      for (const blade of cachedGrassBlades) {
        ctx.beginPath();
        ctx.moveTo(blade.x, blade.y);
        ctx.quadraticCurveTo(blade.x + blade.lean, blade.y - blade.h / 2, blade.x + blade.lean * 2, blade.y - blade.h);
        ctx.stroke();
      }
      ctx.restore();
      
      // Grid lines
      ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= LAYOUT.COLUMNS; i++) {
        const x = lx + i * LAYOUT.CELL_WIDTH;
        ctx.beginPath();
        ctx.moveTo(x, ly);
        ctx.lineTo(x, ly + lh);
        ctx.stroke();
      }
      for (let i = 0; i <= LAYOUT.LANES; i++) {
        const y = ly + i * LAYOUT.CELL_HEIGHT;
        ctx.beginPath();
        ctx.moveTo(lx, y);
        ctx.lineTo(lx + lw, y);
        ctx.stroke();
      }
    }

    function drawBackground(ctx) {
      generateGrassBlades(); // Ensure grass is generated
      generateBushes(); // Ensure bushes are generated
      drawPavement(ctx);
      drawSky(ctx);
      drawHouse(ctx);
      drawLawn(ctx);
      drawFence(ctx);
      drawBushes(ctx);
    }
  </script>

  <!-- UI RENDERER -->
  <script>
    function drawSeedPacket(ctx, packet, currentTime) {
      const plantType = PLANT_TYPES[packet.type];
      const c = COLORS.ui;
      const w = 70, h = 90;
      const isSelected = packet.isSelected;
      const isAvailable = packet.isAvailable;
      
      // Background
      if (!isAvailable && currentTime < packet.cooldownEndTime) {
        ctx.fillStyle = c.disabled;
      } else if (isSelected) {
        ctx.fillStyle = c.packetSelected;
      } else {
        ctx.fillStyle = c.packetBg;
      }
      ctx.beginPath();
      ctx.roundRect(packet.x, packet.y, w, h, 6);
      ctx.fill();
      
      // 3D bevel
      ctx.strokeStyle = c.packetHighlight;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(packet.x + 2, packet.y + h - 2);
      ctx.lineTo(packet.x + 2, packet.y + 2);
      ctx.lineTo(packet.x + w - 2, packet.y + 2);
      ctx.stroke();
      
      ctx.strokeStyle = c.packetBorder;
      ctx.beginPath();
      ctx.moveTo(packet.x + w - 2, packet.y + 2);
      ctx.lineTo(packet.x + w - 2, packet.y + h - 2);
      ctx.lineTo(packet.x + 2, packet.y + h - 2);
      ctx.stroke();
      
      // Plant icon (grayscale if can't afford)
      ctx.save();
      ctx.translate(packet.x + w / 2, packet.y + 32);
      
      if (!isAvailable && !Game.canAfford(plantType.cost)) {
        ctx.filter = 'grayscale(100%) brightness(50%)';
      }
      
      ctx.scale(0.5, 0.5);
      if (packet.type === 'PEASHOOTER') {
        drawPeashooter(ctx, 0, 0, 0, false);
      } else if (packet.type === 'SUNFLOWER') {
        drawSunflower(ctx, 0, 0, 0, false);
      } else if (packet.type === 'WALLNUT') {
        drawWallnut(ctx, 0, 0, 'full', false);
      }
      ctx.restore();
      
      // Text
      ctx.fillStyle = isAvailable ? c.text : '#888';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(plantType.name.substring(0, 3).toUpperCase(), packet.x + w / 2, packet.y + 62);
      
      ctx.fillStyle = isAvailable ? c.cost : '#666';
      ctx.font = 'bold 13px sans-serif';
      ctx.fillText(plantType.cost, packet.x + w / 2, packet.y + 80);
      
      // Cooldown overlay
      if (currentTime < packet.cooldownEndTime) {
        const remaining = packet.cooldownEndTime - currentTime;
        const total = plantType.recharge;
        const pct = remaining / total;
        
        ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        ctx.beginPath();
        ctx.rect(packet.x, packet.y + h * (1 - pct), w, h * pct);
        ctx.fill();
      }
      
      // Selection border
      if (isSelected) {
        ctx.strokeStyle = '#ffeb3b';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.roundRect(packet.x - 2, packet.y - 2, w + 4, h + 4, 8);
        ctx.stroke();
      }
    }

    function drawSunCounter(ctx, x, y, sunAmount) {
      const width = 90;
      const height = 45;
      
      // Background panel
      ctx.fillStyle = COLORS.ui.panel;
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, 8);
      ctx.fill();
      
      ctx.strokeStyle = COLORS.ui.panelBorder;
      ctx.lineWidth = 3;
      ctx.stroke();
      
      // Sun icon
      const c = COLORS.sun;
      ctx.fillStyle = c.core;
      ctx.beginPath();
      ctx.arc(x + 22, y + 22, 12, 0, Math.PI * 2);
      ctx.fill();
      
      // Sun rays
      ctx.strokeStyle = c.ray;
      ctx.lineWidth = 2;
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(x + 22 + Math.cos(angle) * 14, y + 22 + Math.sin(angle) * 14);
        ctx.lineTo(x + 22 + Math.cos(angle) * 18, y + 22 + Math.sin(angle) * 18);
        ctx.stroke();
      }
      
      // Sun amount
      ctx.fillStyle = '#ffeb3b';
      ctx.font = 'bold 22px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(sunAmount.toString(), x + 42, y + 30);
    }

    function drawPlacementGhost(ctx, mouseX, mouseY, selectedPlant, grid) {
      if (!selectedPlant) return;
      
      const gridPos = pixelToGrid(mouseX, mouseY);
      if (!gridPos) return;
      
      const pos = gridToPixel(gridPos.x, gridPos.y);
      const valid = canPlacePlant(gridPos.x, gridPos.y, grid) && Game.canAfford(PLANT_TYPES[selectedPlant].cost);
      
      ctx.save();
      ctx.globalAlpha = 0.4;
      
      if (selectedPlant === 'PEASHOOTER') {
        drawPeashooter(ctx, pos.x, pos.y, 0, false);
      } else if (selectedPlant === 'SUNFLOWER') {
        drawSunflower(ctx, pos.x, pos.y, 0, false);
      } else if (selectedPlant === 'WALLNUT') {
        drawWallnut(ctx, pos.x, pos.y, 'full', false);
      }
      
      ctx.restore();
      
      ctx.strokeStyle = valid ? 'rgba(76, 175, 80, 0.8)' : 'rgba(244, 67, 54, 0.8)';
      ctx.lineWidth = 3;
      ctx.strokeRect(
        LAYOUT.UI_LEFT_MARGIN + gridPos.x * LAYOUT.CELL_WIDTH + 2,
        LAYOUT.UI_TOP_MARGIN + gridPos.y * LAYOUT.CELL_HEIGHT + 2,
        LAYOUT.CELL_WIDTH - 4,
        LAYOUT.CELL_HEIGHT - 4
      );
    }

    function drawGameOver(ctx, won) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
      ctx.fillRect(0, 0, DESIGN_WIDTH, DESIGN_HEIGHT);
      
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 56px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      if (won) {
        ctx.fillText('VICTORY!', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 - 40);
        ctx.font = '28px sans-serif';
        ctx.fillText('All zombies defeated!', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 + 15);
      } else {
        ctx.fillText('GAME OVER', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 - 40);
        ctx.font = '28px sans-serif';
        ctx.fillText('The zombies ate your brains!', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 + 15);
      }
      
      ctx.font = '20px sans-serif';
      ctx.fillStyle = '#ffeb3b';
      ctx.fillText('Click anywhere to restart', DESIGN_WIDTH / 2, DESIGN_HEIGHT / 2 + 70);
    }
  </script>

  <!-- MAIN GAME -->
  <script>
    const Game = {
      canvas: null,
      ctx: null,
      grid: [],
      lastTime: 0,
      gameOver: false,
      victory: false,
      zombieKillCount: 0,
      victoryKills: 50,
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      sun: 150, // Starting sun
      sunPulseTime: 0,
      
      init() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.handleResize();
        this.initGrid();
        InputHandler.init(this.canvas);
        SunSystem.init();
        
        document.getElementById('loading').style.display = 'none';
        requestAnimationFrame((t) => this.loop(t));
      },
      
      handleResize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        const scaleData = calculateScale(this.canvas);
        this.scale = scaleData.scale;
        this.offsetX = scaleData.offsetX;
        this.offsetY = scaleData.offsetY;
      },
      
      initGrid() {
        this.grid = Array(LAYOUT.LANES).fill(null).map(() => Array(LAYOUT.COLUMNS).fill(null));
      },
      
      restart() {
        EntityManager.clear();
        this.initGrid();
        Spawner.reset();
        SunSystem.reset();
        SeedPacketSystem.reset();
        this.gameOver = false;
        this.victory = false;
        this.zombieKillCount = 0;
        this.sun = 150; // Reset starting sun
        this.lastTime = performance.now();
        InputHandler.selectedPlant = null;
      },
      
      onGameOver() { this.gameOver = true; },
      onVictory() { this.victory = true; },
      
      // Sun economy methods
      addSun(amount) {
        this.sun += amount;
        this.sunPulseTime = 200; // Pulse for 200ms
      },
      
      canAfford(cost) {
        return this.sun >= cost;
      },
      
      spendSun(cost) {
        if (this.canAfford(cost)) {
          this.sun -= cost;
          return true;
        }
        return false;
      },
      
      loop(currentTime) {
        if (!this.lastTime) this.lastTime = currentTime;
        const deltaTime = currentTime - this.lastTime;
        this.lastTime = currentTime;
        
        if (!this.gameOver && !this.victory) {
          updateZombies(deltaTime, currentTime, this.grid, () => this.onGameOver());
          updatePlants(currentTime, deltaTime);
          updateProjectiles(deltaTime, DESIGN_WIDTH + 100);
          Spawner.update(currentTime);
          SunSystem.update(deltaTime, currentTime);
          SeedPacketSystem.update(currentTime);
          ParticleSystem.update(deltaTime);
          this.cleanupGrid();
          
          if (this.zombieKillCount >= this.victoryKills) this.onVictory();
        }
        
        if ((this.gameOver || this.victory) && InputHandler.selectedPlant) {
          InputHandler.selectedPlant = null;
        }
        
        // Update sun pulse
        if (this.sunPulseTime > 0) this.sunPulseTime -= deltaTime;
        
        this.render(currentTime);
        requestAnimationFrame((t) => this.loop(t));
      },
      
      cleanupGrid() {
        for (let y = 0; y < LAYOUT.LANES; y++) {
          for (let x = 0; x < LAYOUT.COLUMNS; x++) {
            if (this.grid[y][x] && !this.grid[y][x].active) {
              this.grid[y][x] = null;
            }
          }
        }
      },
      
      render(currentTime) {
        const ctx = this.ctx;
        
        // Clear and setup scaling
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        ctx.save();
        ctx.translate(this.offsetX, this.offsetY);
        ctx.scale(this.scale, this.scale);
        
        // Draw game world at design resolution
        drawBackground(ctx);
        
        // UI elements in design coordinates
        // Draw all seed packets
        for (const packet of SeedPacketSystem.packets) {
          drawSeedPacket(ctx, packet, currentTime);
        }
        
        // Sun counter with pulse effect
        const pulseScale = this.sunPulseTime > 0 ? 1 + Math.sin(this.sunPulseTime * 0.05) * 0.1 : 1;
        ctx.save();
        ctx.translate(260 + 45, 32 + 22);
        ctx.scale(pulseScale, pulseScale);
        ctx.translate(-(260 + 45), -(32 + 22));
        drawSunCounter(ctx, 260, 32, this.sun);
        ctx.restore();
        
        // Entities (sorted by Y for depth)
        const allEntities = [
          ...Array.from(EntityManager.getByType('plant')).map(e => ({...e, sortY: e.transform.y})),
          ...Array.from(EntityManager.getByType('zombie')).map(e => ({...e, sortY: e.transform.y}))
        ].sort((a, b) => a.sortY - b.sortY);
        
        for (const entity of allEntities) {
          if (entity.type === 'plant') drawPlant(ctx, entity);
          else drawZombie(ctx, entity);
        }
        
        // Projectiles on top
        for (const proj of EntityManager.getByType('projectile')) {
          drawProjectile(ctx, proj);
        }
        
        // Sun entities (on top of everything)
        for (const sun of EntityManager.getByType('sun')) {
          drawSun(ctx, sun);
        }
        
        // Particles
        ParticleSystem.draw(ctx);
        
        // Placement ghost
        drawPlacementGhost(ctx, InputHandler.mouseX, InputHandler.mouseY, InputHandler.selectedPlant, this.grid);
        
        // Game over
        if (this.gameOver || this.victory) {
          drawGameOver(ctx, this.victory);
        }
        
        ctx.restore();
      }
    };

    // Track kills
    const originalDestroy = EntityManager.destroy;
    EntityManager.destroy = function(entity) {
      if (entity?.type === 'zombie' && entity.active && entity.zombie?.state === ZOMBIE_STATES.DYING) {
        Game.zombieKillCount++;
      }
      originalDestroy.call(this, entity);
    };

    // Handle click for restart
    window.addEventListener('click', (e) => {
      if (Game.gameOver || Game.victory) {
        const rect = Game.canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        // Check if click is within scaled game area
        if (x >= Game.offsetX && x <= Game.offsetX + DESIGN_WIDTH * Game.scale &&
            y >= Game.offsetY && y <= Game.offsetY + DESIGN_HEIGHT * Game.scale) {
          Game.restart();
        }
      }
    });

    window.onload = () => Game.init();
  </script>
</body>
